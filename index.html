<!DOCTYPE html>
<html>
<head>
  <script defer data-domain="prediction-market1.vercel.app"
src="https://analytics.vgdh.io/js/script.tagged-events.outbound-links.file-downloads.hash.pageview-props.revenue.js"></script>
<title>Verse Market Intelligence</title>
<link href="img/verse.ico" rel="icon">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:12px;
width:500px;
margin:auto;
}

.stat{
font-size:20px;
margin:8px;
}

.bull{color:#22c55e;}
.bear{color:#ef4444;}

canvas{
margin-top:25px;
}
</style>

</head>

<body>

<h1><img src="img/verse.svg" alt="Verse" align="absmiddle" width="35" height="35"> Verse Market Intelligence</h1>

<div class="card">

<div class="stat" id="price">Price: ...</div>
<div class="stat" id="yesterday">Yesterday: ...</div>
<div class="stat" id="prediction" style="color: #22c55e;">Tomorrow Prediction: ...</div>

<div class="stat" id="cycle"></div>
<div class="stat" id="days"></div>
<div class="stat" id="peak"></div>

<canvas id="chart"></canvas>

</div>

<script>

async function loadData(){

const url =
"https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=30";

const res = await fetch(url);
const data = await res.json();

const prices = data.prices.map(p => p[1]);

const today = prices[prices.length-1];
const yesterday = prices[prices.length-2];

const change = today - yesterday;

const prediction = today + change;

document.getElementById("price").innerText =
"Price: $" + today.toFixed(2);

document.getElementById("yesterday").innerText =
"Yesterday: $" + yesterday.toFixed(2);

document.getElementById("prediction").innerText =
"Tomorrow Prediction: $" + prediction.toFixed(2);

detectCycle(today);

drawChart(prices);

}

function detectCycle(price){

const halvingDate = new Date("2024-04-20");

const today = new Date();

const diff = today - halvingDate;

const days = Math.floor(diff/(1000*60*60*24));

document.getElementById("days").innerText =
"Days Since Halving: " + days;

let phase;

if(days < 0){

phase = "Pre-Halving Accumulation";

}

else if(days < 550){

phase = "BULL MARKET";

document.getElementById("cycle").className="stat bull";

}

else{

phase = "BEAR MARKET";

document.getElementById("cycle").className="stat bear";

}

document.getElementById("cycle").innerText =
"Market Phase: " + phase;

estimatePeak(price);

}

function estimatePeak(price){

const multiplier = 3;

const peak = price * multiplier;

document.getElementById("peak").innerText =
"Estimated Cycle Peak: $" + peak.toFixed(0);

}

function drawChart(prices){

const ctx = document.getElementById("chart");

new Chart(ctx,{ 

type:"line",

data:{
labels:prices.map((_,i)=>i),
datasets:[{
label:"BTC Price (30 days)",
data:prices
}]
}

});

}

loadData();

</script>

</body>
</html>
